<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EOC Tour Survey Checklist</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;500;600;700&display=swap');

  :root {
    --army-green: #4a5c3e;
    --army-dark: #2d3a25;
    --army-tan: #c8b89a;
    --army-light: #f0ece3;
    --accent: #8b3a3a;
    --open-color: #c0392b;
    --closed-color: #27ae60;
    --na-color: #7f8c8d;
    --border: #b5a892;
    --shadow: rgba(45,58,37,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--army-light);
    color: #2d2d2d;
    min-height: 100vh;
  }

  /* ── SCREEN HEADER ── */
  .screen-header {
    background: var(--army-dark);
    color: var(--army-tan);
    padding: 12px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px var(--shadow);
  }
  .screen-header h1 {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 1px;
    line-height: 1.3;
  }
  .screen-header .subtitle { font-size: 10px; opacity: 0.7; margin-top: 2px; }

  .print-btn {
    background: var(--army-tan);
    color: var(--army-dark);
    border: none;
    padding: 8px 16px;
    border-radius: 4px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .print-btn:hover { background: #fff; }
  .print-btn.disabled {
    background: #888;
    color: #ccc;
    cursor: not-allowed;
    opacity: 0.7;
  }

  /* ── MISSING ITEMS PANEL ── */
  .missing-panel {
    display: none;
    background: #fff3f3;
    border: 2px solid var(--open-color);
    margin: 10px 14px;
    border-radius: 6px;
    overflow: hidden;
  }
  .missing-panel.visible { display: block; }
  .missing-panel-header {
    background: var(--open-color);
    color: #fff;
    padding: 8px 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .missing-panel-close {
    background: none;
    border: none;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }
  .missing-list { padding: 8px 0; max-height: 300px; overflow-y: auto; }
  .missing-item {
    padding: 7px 14px;
    border-bottom: 1px solid #fdd;
    cursor: pointer;
    display: flex;
    gap: 8px;
    align-items: flex-start;
    transition: background 0.1s;
  }
  .missing-item:hover { background: #ffe8e8; }
  .missing-item:last-child { border-bottom: none; }
  .missing-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--open-color);
    font-weight: 700;
    min-width: 22px;
    padding-top: 1px;
  }
  .missing-text { font-size: 12px; line-height: 1.4; color: #444; flex: 1; }
  .missing-code {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--army-green);
    font-weight: 700;
    white-space: nowrap;
    padding-top: 1px;
  }

  /* ── INCOMPLETE ITEM HIGHLIGHT ── */
  .checklist-item.incomplete {
    border-left: 4px solid var(--open-color);
    background: #fff8f8;
  }
  .checklist-item.incomplete .item-question { color: #8b1a1a; }
  .checklist-item.pulse {
    animation: pulseRed 0.6s ease;
  }
  @keyframes pulseRed {
    0%   { background: #fff; }
    30%  { background: #ffd5d5; }
    100% { background: #fff8f8; }
  }

  /* ── META FIELDS ── */
  .meta-section {
    background: #fff;
    border-bottom: 3px solid var(--army-green);
    padding: 14px 16px;
  }
  .meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .meta-field { display: flex; flex-direction: column; gap: 4px; }
  .meta-field.full { grid-column: 1 / -1; }
  .meta-field label {
    font-size: 10px;
    font-weight: 700;
    color: var(--army-green);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .meta-field input {
    border: 1.5px solid var(--border);
    border-radius: 4px;
    padding: 7px 10px;
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    background: var(--army-light);
    color: #2d2d2d;
  }
  .meta-field input:focus { outline: none; border-color: var(--army-green); background: #fff; }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    background: #fff;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 57px;
    z-index: 99;
  }
  .progress-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .progress-label { font-size: 11px; font-weight: 600; color: var(--army-green); }
  .progress-count { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--accent); }
  .progress-bar-bg { height: 6px; background: #e0d8cc; border-radius: 3px; overflow: hidden; }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--army-green), var(--closed-color));
    border-radius: 3px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* ── SECTION HEADERS ── */
  .section-header {
    background: var(--army-green);
    color: #fff;
    padding: 8px 10px 8px 16px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-icon { font-size: 16px; }
  .section-title { flex: 1; }

  .bulk-btns {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .bulk-btn {
    padding: 4px 8px;
    border-radius: 4px;
    border: 1.5px solid rgba(255,255,255,0.35);
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .bulk-btn:hover { background: rgba(255,255,255,0.25); border-color: #fff; }
  .bulk-btn.bulk-na   { border-color: rgba(173,181,189,0.6); }
  .bulk-btn.bulk-na:hover   { background: var(--na-color); border-color: var(--na-color); }
  .bulk-btn.bulk-closed { border-color: rgba(107,203,119,0.6); }
  .bulk-btn.bulk-closed:hover { background: var(--closed-color); border-color: var(--closed-color); }
  .bulk-btn.bulk-reset { border-color: rgba(255,107,107,0.5); font-size: 11px; padding: 3px 7px; }
  .bulk-btn.bulk-reset:hover { background: var(--open-color); border-color: var(--open-color); }

  /* Confirmation flash on section header */
  .section-header.bulk-flash {
    animation: bulkFlash 0.5s ease;
  }
  @keyframes bulkFlash {
    0%   { background: var(--army-green); }
    40%  { background: #2d7a4f; }
    100% { background: var(--army-green); }
  }

  @media print {
    .bulk-btns { display: none !important; }
    .section-header { padding: 4pt 6pt; }
  }

  .subsection-header {
    background: var(--army-tan);
    color: var(--army-dark);
    padding: 7px 16px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-left: 4px solid var(--army-green);
  }

  /* ── CHECKLIST ITEMS ── */
  .checklist-item {
    background: #fff;
    border-bottom: 1px solid #e8e2d8;
    padding: 12px 14px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    transition: background 0.15s;
  }
  .checklist-item:active { background: #f5f0e8; }

  .item-top { display: flex; gap: 10px; align-items: flex-start; }

  .item-question {
    font-size: 13px;
    line-height: 1.45;
    flex: 1;
    color: #2d2d2d;
  }
  .item-ref {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: #888;
    margin-top: 3px;
    line-height: 1.4;
  }
  .item-code {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--army-green);
    white-space: nowrap;
    padding-top: 2px;
  }

  /* ── STATUS BUTTONS ── */
  .status-row { display: flex; gap: 6px; align-items: center; }
  .status-btn {
    padding: 5px 12px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    background: #f5f0e8;
    color: #888;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }
  .status-btn.active-open {
    background: var(--open-color);
    border-color: var(--open-color);
    color: #fff;
  }
  .status-btn.active-closed {
    background: var(--closed-color);
    border-color: var(--closed-color);
    color: #fff;
  }
  .status-btn.active-na {
    background: var(--na-color);
    border-color: var(--na-color);
    color: #fff;
  }

  /* ── COMMENT INPUT ── */
  .comment-input {
    border: 1.5px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    font-family: 'Barlow', sans-serif;
    font-size: 12px;
    width: 100%;
    background: var(--army-light);
    color: #2d2d2d;
    resize: none;
  }
  .comment-input:focus { outline: none; border-color: var(--army-green); background: #fff; }
  .comment-row { display: none; }
  .comment-row.visible { display: block; }

  /* ── DATE CLOSED ── */
  .date-closed-row { display: none; align-items: center; gap: 6px; }
  .date-closed-row.visible { display: flex; }
  .date-closed-row label { font-size: 10px; font-weight: 700; color: var(--closed-color); white-space: nowrap; }
  .date-closed-row input {
    border: 1.5px solid var(--closed-color);
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 12px;
    font-family: 'Share Tech Mono', monospace;
    color: var(--closed-color);
    background: #f0fff4;
    flex: 1;
  }

  /* ── BOTTOM SUMMARY ── */
  .summary-section {
    background: var(--army-dark);
    color: var(--army-tan);
    margin: 20px 0 0;
    padding: 16px;
    text-align: center;
  }
  .summary-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    margin-bottom: 12px;
    opacity: 0.7;
  }
  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .summary-box {
    background: rgba(255,255,255,0.07);
    border-radius: 6px;
    padding: 10px 6px;
  }
  .summary-box .val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    display: block;
  }
  .summary-box .lbl { font-size: 10px; opacity: 0.7; margin-top: 2px; display: block; }
  .summary-box.open .val { color: #ff6b6b; }
  .summary-box.closed .val { color: #6bcb77; }
  .summary-box.na .val { color: #adb5bd; }

  .bottom-print-btn {
    display: block;
    width: calc(100% - 32px);
    margin: 14px auto 0;
    background: var(--army-tan);
    color: var(--army-dark);
    border: none;
    padding: 12px;
    border-radius: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1.5px;
  }
  .bottom-print-btn.disabled {
    background: #666;
    color: #aaa;
    cursor: not-allowed;
  }

  .spacer { height: 30px; }

  /* ── INCOMPLETE HIGHLIGHT ── */
  .checklist-item.incomplete {
    border-left: 4px solid var(--open-color);
    background: #fff8f8;
  }
  .checklist-item.incomplete .item-question { color: #8b1a1a; }
  .checklist-item.pulse { animation: pulseRed 0.6s ease; }
  @keyframes pulseRed {
    0%   { background: #fff; }
    30%  { background: #ffd5d5; }
    100% { background: #fff8f8; }
  }

  /* ── FLOATING SIDE NAV ── */
  .side-nav-toggle {
    position: fixed;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    z-index: 200;
    background: var(--army-dark);
    color: var(--army-tan);
    border: none;
    border-radius: 8px 0 0 8px;
    width: 28px;
    padding: 14px 0;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    box-shadow: -2px 0 10px var(--shadow);
    transition: width 0.2s;
  }
  .side-nav-toggle:hover { width: 32px; }
  .hamburger-line {
    width: 13px; height: 2px;
    background: var(--army-tan);
    border-radius: 1px;
    display: block;
  }
  .toggle-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 7px;
    letter-spacing: 1px;
    writing-mode: vertical-rl;
    margin-top: 6px;
    opacity: 0.75;
    color: var(--army-tan);
  }

  .side-nav-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 299;
  }
  .side-nav-overlay.visible { display: block; }

  .side-nav-drawer {
    position: fixed;
    right: -265px;
    top: 0;
    height: 100%;
    width: 265px;
    background: var(--army-dark);
    z-index: 300;
    transition: right 0.28s cubic-bezier(0.4,0,0.2,1);
    display: flex;
    flex-direction: column;
    box-shadow: -4px 0 24px rgba(0,0,0,0.5);
  }
  .side-nav-drawer.open { right: 0; }

  .side-nav-header {
    background: var(--army-green);
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .side-nav-header span {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #fff;
    letter-spacing: 1.5px;
    font-weight: 700;
  }
  .side-nav-close {
    background: none; border: none;
    color: #fff; font-size: 20px;
    cursor: pointer; line-height: 1; padding: 0 2px;
  }

  .side-nav-list { overflow-y: auto; flex: 1; padding: 6px 0; }

  .side-nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 16px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    transition: background 0.15s;
  }
  .side-nav-item:active { background: rgba(255,255,255,0.12); }
  .side-nav-item.active-section {
    background: rgba(200,184,154,0.13);
    border-left: 3px solid var(--army-tan);
    padding-left: 13px;
  }
  .side-nav-icon { font-size: 17px; min-width: 24px; text-align: center; }
  .side-nav-text { flex: 1; }
  .side-nav-name {
    font-size: 11px; font-weight: 600;
    color: var(--army-tan); line-height: 1.3; display: block;
  }
  .side-nav-progress {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: rgba(200,184,154,0.5);
    margin-top: 2px; display: block;
  }
  .side-nav-dot {
    width: 9px; height: 9px;
    border-radius: 50%; flex-shrink: 0;
    transition: background 0.3s;
    background: #444;
  }
  .side-nav-dot.done    { background: var(--closed-color); }
  .side-nav-dot.partial { background: var(--army-tan); }
  .side-nav-dot.empty   { background: #444; }

  /* ════════════════════════════════
     PRINT STYLES
  ════════════════════════════════ */
  @media print {
    @page { size: A4; margin: 12mm 10mm; }

    body { background: #fff; font-size: 9pt; }

    .screen-header, .progress-wrap, .bottom-print-btn, .status-btn,
    .comment-input, .date-closed-row label { display: none !important; }

    .meta-section { border-bottom: 2pt solid #000; padding: 6pt 8pt; }
    .meta-grid { grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6pt; }
    .meta-field input {
      border: none;
      border-bottom: 1pt solid #000;
      background: transparent;
      font-size: 9pt;
      padding: 2pt 4pt;
      border-radius: 0;
    }
    .meta-field label { font-size: 7pt; }

    .section-header {
      background: #333 !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      color: #fff !important;
      padding: 4pt 6pt;
      font-size: 8pt;
      margin-top: 8pt;
      break-inside: avoid;
    }
    .subsection-header {
      background: #ddd !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      padding: 3pt 6pt;
      font-size: 7pt;
    }

    .checklist-item {
      padding: 4pt 6pt;
      border-bottom: 0.5pt solid #ccc;
      break-inside: avoid;
      gap: 3pt;
    }
    .item-top { gap: 6pt; }
    .item-question { font-size: 8pt; line-height: 1.3; }
    .item-ref { font-size: 6pt; }
    .item-code { font-size: 8pt; }

    .status-row { display: none; }

    /* Print status as text */
    .checklist-item::before { display: none; }
    .print-status-row {
      display: flex !important;
      gap: 12pt;
      align-items: center;
      border-top: 0.5pt dashed #ccc;
      padding-top: 2pt;
      margin-top: 2pt;
    }
    .print-status-cell {
      font-size: 7pt;
      min-width: 60pt;
    }
    .print-status-cell span { font-weight: 700; }
    .print-comment-cell { font-size: 7pt; flex: 1; }

    .comment-row { display: block !important; }
    .comment-row textarea {
      border: none;
      border-bottom: 0.5pt solid #ccc;
      background: transparent;
      font-size: 7pt;
      padding: 1pt;
      resize: none;
      width: 100%;
    }
    .date-closed-row { display: flex !important; }
    .date-closed-row label { display: block !important; font-size: 7pt; }
    .date-closed-row input {
      border: none;
      border-bottom: 0.5pt solid #666;
      background: transparent;
      font-size: 7pt;
      color: #000;
    }

    .summary-section {
      background: #333 !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      color: #fff !important;
      margin-top: 10pt;
      padding: 8pt;
    }
    .summary-grid { gap: 4pt; }
    .summary-box { background: rgba(255,255,255,0.15) !important; padding: 4pt; }
    .summary-box .val { font-size: 14pt; }
    .summary-box .lbl { font-size: 7pt; }
    .summary-box.open .val { color: #ff6b6b !important; }
    .summary-box.closed .val { color: #6bcb77 !important; }
    .summary-box.na .val { color: #aaa !important; }
    .summary-title { font-size: 8pt; }

    .spacer { height: 0; }
  }
</style>
</head>
<body>

<!-- SCREEN HEADER -->
<div class="screen-header">
  <div>
    <div class="h1">EOC TOUR SURVEY CHECKLIST</div>
    <div class="subtitle">CAMP HUMPHREYS · MEDDAC-K / BAACH</div>
  </div>
  <button class="print-btn disabled" id="top-print-btn" onclick="handlePrint()">🖨 PRINT</button>
</div>

<!-- META FIELDS -->
<div class="meta-section">
  <div class="meta-grid">
    <div class="meta-field">
      <label>Date</label>
      <input type="date" id="meta-date">
    </div>
    <div class="meta-field">
      <label>Clinic</label>
      <input type="text" id="meta-clinic" placeholder="Clinic name">
    </div>
    <div class="meta-field full">
      <label>WMC's Name</label>
      <input type="text" id="meta-wmc" placeholder="Waste Management Coordinator">
    </div>
  </div>
</div>

<!-- PROGRESS -->
<div class="progress-wrap">
  <div class="progress-row">
    <span class="progress-label">INSPECTION PROGRESS</span>
    <span class="progress-count" id="prog-count">0 / 0</span>
  </div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-bar"></div></div>
</div>

<div class="missing-panel" id="missing-panel">
  <div class="missing-panel-header">
    <span>⚠ INCOMPLETE ITEMS — TAP TO JUMP</span>
    <button class="missing-panel-close" onclick="closeMissingPanel()">✕</button>
  </div>
  <div class="missing-list" id="missing-list"></div>
</div>

<div id="checklist-body"></div>

<!-- SUMMARY -->
<div class="summary-section">
  <div class="summary-title">▸ INSPECTION SUMMARY ◂</div>
  <div class="summary-grid">
    <div class="summary-box open">
      <span class="val" id="sum-open">0</span>
      <span class="lbl">OPEN</span>
    </div>
    <div class="summary-box closed">
      <span class="val" id="sum-closed">0</span>
      <span class="lbl">CLOSED</span>
    </div>
    <div class="summary-box na">
      <span class="val" id="sum-na">0</span>

// State: { status: 'open'|'closed'|'na'|null, dateClose: '', comment: '' }
const state = {};
let idCounter = 0;
const sectionGroups = {}; // sectionKey -> [item ids]

function buildChecklist() {
  const body = document.getElementById('checklist-body');
  let lastSection = null;
  let currentSectionKey = null;
  let sectionHeaderEl = null;

  DATA.forEach(group => {
    if (group.section !== lastSection) {
      // Finalize previous section header with bulk buttons
      if (sectionHeaderEl && currentSectionKey) {
        attachBulkButtons(sectionHeaderEl, currentSectionKey);
      }

      currentSectionKey = group.section.replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_]/g, '');
      if (!sectionGroups[currentSectionKey]) sectionGroups[currentSectionKey] = [];

      sectionHeaderEl = document.createElement('div');
      sectionHeaderEl.className = 'section-header';
      sectionHeaderEl.dataset.sectionKey = currentSectionKey;
      sectionHeaderEl.innerHTML = `
        <span class="section-icon">${group.icon}</span>
        <span class="section-title">${group.section}</span>
        <span class="bulk-btns" id="bulk-${currentSectionKey}"></span>
      `;
      body.appendChild(sectionHeaderEl);
      lastSection = group.section;
    }
    if (group.subsection) {
      const sub = document.createElement('div');
      sub.className = 'subsection-header';
      sub.textContent = group.subsection;
      body.appendChild(sub);
    }

    group.items.forEach(item => {
      const id = `item-${idCounter++}`;
      state[id] = { status: null, dateClose: '', comment: '' };
      if (currentSectionKey) sectionGroups[currentSectionKey].push(id);

      const div = document.createElement('div');
      div.className = 'checklist-item';
      div.dataset.id = id;
      div.innerHTML = `
        <div class="item-top">
          <div>
            <div class="item-question">${item.q}</div>
            ${item.ref ? `<div class="item-ref">${item.ref}</div>` : ''}
          </div>
          <div class="item-code">${item.code}</div>
        </div>
        <div class="status-row">
          <button class="status-btn" data-id="${id}" data-val="open">OPEN</button>
          <button class="status-btn" data-id="${id}" data-val="closed">CLOSED</button>
          <button class="status-btn" data-id="${id}" data-val="na">N/A</button>
        </div>
        <div class="date-closed-row" id="date-row-${id}">
          <label>Date Closed:</label>
          <input type="date" id="date-${id}">
        </div>
        <div class="comment-row" id="comment-row-${id}">
          <textarea class="comment-input" id="comment-${id}" rows="2" placeholder="Comments..."></textarea>
        </div>
        <div class="print-status-row" style="display:none" id="print-row-${id}">
          <div class="print-status-cell">Status: <span id="ps-${id}">—</span></div>
          <div class="print-status-cell" id="pd-${id}"></div>
          <div class="print-comment-cell" id="pc-${id}"></div>
        </div>
      `;
      body.appendChild(div);
    });
  });

  // Attach bulk buttons to the last section
  if (sectionHeaderEl && currentSectionKey) {
    attachBulkButtons(sectionHeaderEl, currentSectionKey);
  }

  // Events
  document.querySelectorAll('.status-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const val = btn.dataset.val;
      state[id].status = state[id].status === val ? null : val;
      refreshItem(id);
      updateSummary();
    });
  });

  document.querySelectorAll('[id^="comment-"]').forEach(ta => {
    const id = ta.id.replace('comment-', '');
    ta.addEventListener('input', () => { state[id].comment = ta.value; updatePrintRow(id); });
  });
  document.querySelectorAll('[id^="date-"]').forEach(inp => {
    if (!inp.id.startsWith('date-item')) return;
  });
  // date inputs
  body.querySelectorAll('input[type=date]').forEach(inp => {
    if (inp.id.startsWith('date-item') || inp.id.startsWith('date-')) {
      const id = inp.id.replace('date-', '');
      if (state[id] !== undefined) {
        inp.addEventListener('change', () => { state[id].dateClose = inp.value; updatePrintRow(id); });
      }
    }
  });

  updateSummary();
}

function refreshItem(id) {
  const s = state[id].status;
  const btns = document.querySelectorAll(`.status-btn[data-id="${id}"]`);
  btns.forEach(b => {
    b.classList.remove('active-open','active-closed','active-na');
    if (s === b.dataset.val) {
      b.classList.add(`active-${s}`);
    }
  });
  const commentRow = document.getElementById(`comment-row-${id}`);
  const dateRow = document.getElementById(`date-row-${id}`);
  if (s === 'open') {
    commentRow.classList.add('visible');
    dateRow.classList.remove('visible');
  } else if (s === 'closed') {
    commentRow.classList.add('visible');
    dateRow.classList.add('visible');
  } else {
    commentRow.classList.remove('visible');
    dateRow.classList.remove('visible');
  }
  updatePrintRow(id);
}

function updatePrintRow(id) {
  const s = state[id];
  document.getElementById(`ps-${id}`).textContent = s.status ? s.status.toUpperCase() : '—';
  const pd = document.getElementById(`pd-${id}`);
  pd.textContent = s.status === 'closed' && s.dateClose ? `Closed: ${s.dateClose}` : '';
  document.getElementById(`pc-${id}`).textContent = s.comment || '';
}

function updateSummary() {
  const all = Object.values(state);
  const total = all.length;
  const answered = all.filter(s => s.status !== null).length;
  const open = all.filter(s => s.status === 'open').length;
  const closed = all.filter(s => s.status === 'closed').length;
  const na = all.filter(s => s.status === 'na').length;
  const remaining = total - answered;

  document.getElementById('prog-count').textContent = `${answered} / ${total}`;
  document.getElementById('prog-bar').style.width = `${(answered/total)*100}%`;
  document.getElementById('sum-open').textContent = open;
  document.getElementById('sum-closed').textContent = closed;
  document.getElementById('sum-na').textContent = na;

  // Update incomplete highlights
  Object.keys(state).forEach(id => {
    const el = document.querySelector(`.checklist-item[data-id="${id}"]`);
    if (!el) return;
    if (state[id].status === null) {
      el.classList.add('incomplete');
    } else {
      el.classList.remove('incomplete');
    }
  });

  // Enable/disable print buttons
  const allDone = remaining === 0;
  const topBtn = document.getElementById('top-print-btn');
  const botBtn = document.getElementById('bottom-print-btn');
  if (allDone) {
    topBtn.classList.remove('disabled');
    botBtn.classList.remove('disabled');
    topBtn.title = '';
    botBtn.title = '';
  } else {
    topBtn.classList.add('disabled');
    botBtn.classList.add('disabled');
    topBtn.title = `${remaining} items remaining`;
    botBtn.title = `${remaining} items remaining`;
  }
}

function handlePrint() {
  const incomplete = Object.keys(state).filter(id => state[id].status === null);
  if (incomplete.length > 0) {
    showMissingPanel(incomplete);
    // Pulse all incomplete items
    incomplete.forEach(id => {
      const el = document.querySelector(`.checklist-item[data-id="${id}"]`);
      if (el) {
        el.classList.remove('pulse');
        void el.offsetWidth; // reflow to restart animation
        el.classList.add('pulse');
      }
    });
    // Scroll to first incomplete
    const first = document.querySelector(`.checklist-item[data-id="${incomplete[0]}"]`);
    if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
  } else {
    window.print();
  }
}

function showMissingPanel(incompleteIds) {
  const panel = document.getElementById('missing-panel');
  const list = document.getElementById('missing-list');
  list.innerHTML = '';
  incompleteIds.forEach((id, idx) => {
    const el = document.querySelector(`.checklist-item[data-id="${id}"]`);
    if (!el) return;
    const q = el.querySelector('.item-question').textContent;
    const code = el.querySelector('.item-code').textContent;
    const row = document.createElement('div');
    row.className = 'missing-item';
    row.innerHTML = `
      <span class="missing-num">#${idx+1}</span>
      <span class="missing-text">${q.length > 80 ? q.slice(0,80)+'…' : q}</span>
      <span class="missing-code">${code}</span>
    `;
    row.addEventListener('click', () => {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.classList.remove('pulse');
      void el.offsetWidth;
      el.classList.add('pulse');
    });
    list.appendChild(row);
  });
  panel.classList.add('visible');
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function closeMissingPanel() {
  document.getElementById('missing-panel').classList.remove('visible');
}

function attachBulkButtons(headerEl, sectionKey) {
  const container = headerEl.querySelector(`#bulk-${sectionKey}`);
  if (!container) return;

  const btnClosed = document.createElement('button');
  btnClosed.className = 'bulk-btn bulk-closed';
  btnClosed.textContent = '✔ All CLOSED';
  btnClosed.title = 'Mark all items in this section as CLOSED';
  btnClosed.addEventListener('click', (e) => {
    e.stopPropagation();
    bulkApply(sectionKey, 'closed', headerEl);
  });

  const btnNA = document.createElement('button');
  btnNA.className = 'bulk-btn bulk-na';
  btnNA.textContent = '— All N/A';
  btnNA.title = 'Mark all items in this section as N/A';
  btnNA.addEventListener('click', (e) => {
    e.stopPropagation();
    bulkApply(sectionKey, 'na', headerEl);
  });

  const btnReset = document.createElement('button');
  btnReset.className = 'bulk-btn bulk-reset';
  btnReset.textContent = '↺';
  btnReset.title = 'Reset all items in this section';
  btnReset.addEventListener('click', (e) => {
    e.stopPropagation();
    bulkApply(sectionKey, null, headerEl);
  });

  container.appendChild(btnClosed);
  container.appendChild(btnNA);
  container.appendChild(btnReset);
}

function bulkApply(sectionKey, status, headerEl) {
  const ids = sectionGroups[sectionKey] || [];
  if (ids.length === 0) return;

  // Confirm reset only
  if (status === null) {
    const confirmed = confirm(`Reset all ${ids.length} items in this section?`);
    if (!confirmed) return;
  }

  ids.forEach(id => {
    state[id].status = status;
    if (status !== 'closed') state[id].dateClose = '';
    refreshItem(id);
    updatePrintRow(id);
  });

  updateSummary();
  updateSideNav();

  // Flash the header
  if (headerEl) {
    headerEl.classList.remove('bulk-flash');
    void headerEl.offsetWidth;
    headerEl.classList.add('bulk-flash');
  }
}

buildChecklist();

// Set today's date
document.getElementById('meta-date').valueAsDate = new Date();

// ── SIDE NAV BUILD ──
const SECTIONS = [
  { icon: '☣', name: 'HAZMAT / HM & HW',         anchor: 'sec-hazmat' },
  { icon: '💊', name: 'Pharmaceutical Waste',      anchor: 'sec-pw' },
  { icon: '🩸', name: 'Regulated Medical Waste',   anchor: 'sec-rmw' },
  { icon: '🏭', name: 'Satellite Accum. Point',    anchor: 'sec-sap' },
  { icon: '⚠',  name: 'Spill Response',            anchor: 'sec-spill' },
  { icon: '🥽', name: 'PPE',                        anchor: 'sec-ppe' },
  { icon: '👁',  name: 'Eyewash Stations',          anchor: 'sec-eye' },
  { icon: '🔥', name: 'Flammable Cabinet',          anchor: 'sec-flam' },
  { icon: '☢',  name: 'Radiation Safety',           anchor: 'sec-rad' },
];

// Tag each section header with an id
document.querySelectorAll('.section-header').forEach((el, i) => {
  if (SECTIONS[i]) el.id = SECTIONS[i].anchor;
});

// Track which items belong to each section
const sectionItemMap = {}; // anchor -> [id, ...]
let currentAnchorIdx = 0;
document.querySelectorAll('#checklist-body > *').forEach(el => {
  if (el.classList.contains('section-header')) {
    const idx = SECTIONS.findIndex(s => s.anchor === el.id);
    if (idx !== -1) currentAnchorIdx = idx;
  }
  if (el.classList.contains('checklist-item')) {
    const anchor = SECTIONS[currentAnchorIdx]?.anchor;
    if (anchor) {
      if (!sectionItemMap[anchor]) sectionItemMap[anchor] = [];
      sectionItemMap[anchor].push(el.dataset.id);
    }
  }
});

function buildSideNav() {
  const list = document.getElementById('side-nav-list');
  list.innerHTML = '';
  SECTIONS.forEach(sec => {
    const ids = sectionItemMap[sec.anchor] || [];
    const total = ids.length;
    const done = ids.filter(id => state[id]?.status !== null).length;
    const dotClass = done === 0 ? 'empty' : done === total ? 'done' : 'partial';

    const item = document.createElement('div');
    item.className = 'side-nav-item';
    item.id = `nav-${sec.anchor}`;
    item.innerHTML = `
      <span class="side-nav-icon">${sec.icon}</span>
      <span class="side-nav-text">
        <span class="side-nav-name">${sec.name}</span>
        <span class="side-nav-progress">${done} / ${total} checked</span>
      </span>
      <span class="side-nav-dot ${dotClass}"></span>
    `;
    item.addEventListener('click', () => {
      const target = document.getElementById(sec.anchor);
      if (target) {
        closeSideNav();
        setTimeout(() => target.scrollIntoView({ behavior: 'smooth', block: 'start' }), 220);
      }
    });
    list.appendChild(item);
  });
}

function updateSideNav() {
  SECTIONS.forEach(sec => {
    const ids = sectionItemMap[sec.anchor] || [];
    const total = ids.length;
    const done = ids.filter(id => state[id]?.status !== null).length;
    const dotClass = done === 0 ? 'empty' : done === total ? 'done' : 'partial';
    const dot = document.querySelector(`#nav-${sec.anchor} .side-nav-dot`);
    const prog = document.querySelector(`#nav-${sec.anchor} .side-nav-progress`);
    if (dot) { dot.className = `side-nav-dot ${dotClass}`; }
    if (prog) prog.textContent = `${done} / ${total} checked`;
  });
  highlightActiveSection();
}

function highlightActiveSection() {
  const scrollY = window.scrollY + 120;
  let active = SECTIONS[0]?.anchor;
  SECTIONS.forEach(sec => {
    const el = document.getElementById(sec.anchor);
    if (el && el.offsetTop <= scrollY) active = sec.anchor;
  });
  document.querySelectorAll('.side-nav-item').forEach(el => el.classList.remove('active-section'));
  const activeEl = document.getElementById(`nav-${active}`);
  if (activeEl) activeEl.classList.add('active-section');
}

window.addEventListener('scroll', highlightActiveSection, { passive: true });

function openSideNav() {
  document.getElementById('side-nav-drawer').classList.add('open');
  document.getElementById('side-nav-overlay').classList.add('visible');
  updateSideNav();
}
function closeSideNav() {
  document.getElementById('side-nav-drawer').classList.remove('open');
  document.getElementById('side-nav-overlay').classList.remove('visible');
}

// Hook into updateSummary to also refresh side nav dots
const _origUpdateSummary = updateSummary;
// Patch: call updateSideNav after every summary update
const origUpdate = updateSummary;
function updateSummaryPatched() {
  origUpdate();
  updateSideNav();
}
// Replace all calls — override the function reference used by event listeners
document.querySelectorAll('.status-btn').forEach(btn => {
  btn.replaceWith(btn.cloneNode(true));
});
document.querySelectorAll('.status-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const id = btn.dataset.id;
    const val = btn.dataset.val;
    state[id].status = state[id].status === val ? null : val;
    refreshItem(id);
    updateSummary();
    updateSideNav();
  });
});

buildSideNav();
highlightActiveSection();
</script>
